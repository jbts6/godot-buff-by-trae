[plugin]
name="OmniBuff"
description="All is Buff/Modifier: high-performance turn-based buff/stat system."
author="SOLO"
version="0.1.0"
# 注意：plugin.cfg 的 script 路径会相对于本文件所在目录解析（addons/omnibuff/）。
# 若写成完整 res:// 路径，Godot 会把它再次拼接，导致：
#   res://addons/omnibuff/res://addons/omnibuff/omnibuff.gd
script="omnibuff.gd"
